# This is an example configuration file for Redpanda Console v3.x.x

#----------------------------------------------------------------------------
# Kafka configuration
#----------------------------------------------------------------------------
kafka:
  # Brokers is a list of bootstrap servers with ports.
  brokers:
    - "redpanda-0:9092"
  #  - "redpanda-1:9092"
  #  - "redpanda-2:9092"
#----------------------------------------------------------------------------
#----------------------------------------------------------------------------
# Schema Registry configuration
#----------------------------------------------------------------------------
schemaRegistry:
  enabled: true
  urls:
    - "http://redpanda-0:8081"
  #  - "http://redpanda-1:8081"
  #  - "http://redpanda-2:8081"
 # tls:
 #   enabled: false
#----------------------------------------------------------------------------
# Redpanda Admin API configuration
#----------------------------------------------------------------------------
redpanda:
  adminApi:
    enabled: true
    urls:
      - "http://redpanda-0:9644"
  #    - "http://redpanda-1:9644"
  #    - "http://redpanda-2:9644"
  #  tls:
  #    enabled: false
#----------------------------------------------------------------------------
# Kafka Connect configuration (configuration for connecting to external Kafka Connect clusters, not Redpanda Connect)
#----------------------------------------------------------------------------
kafkaConnect:
  enabled: true
  # connectTimeout: 15s
  # readTimeout: 60s
  # requestTimeout: 6s
  clusters:    
    - name: my-connect-cluster
      url: "http://connect:8083"
    #   tls:
    #     enabled: false
    #   username: "connect-user"
    #   password: "connect-password"
    #   token: "optional-token"  

#----------------------------------------------------------------------------
# Console configuration
#----------------------------------------------------------------------------
console:
  topicDocumentation:
    enabled: false
    # url: "https://docs.mycompany.com/topics/{{topicName}}"

#----------------------------------------------------------------------------
# Logger configuration
#----------------------------------------------------------------------------
logger:
  level: info

#----------------------------------------------------------------------------
# Metrics settings
#----------------------------------------------------------------------------

# Prefix for all exported Prometheus metrics.
# Uncomment and set your metrics namespace.
# metricsNamespace: "console"

#----------------------------------------------------------------------------
# Analytics / telemetry (optional)
#----------------------------------------------------------------------------
analytics:
  enabled: false
  # analyticsEndpoint: "https://analytics.redpanda.com/collect"
  # telemetryEndpoint: "https://telemetry.redpanda.com/collect"