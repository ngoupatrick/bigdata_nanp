name: bigdata_nifi
services:

  kafka:
    #image: apache/kafka:latest
    # size: 227.2 MB
    image: apache/kafka:4.2.0-rc2
    hostname: kafka
    container_name: kafka
    ports:
      - "9292:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    healthcheck:
      # Vérifie que le broker est prêt à accepter des connexions
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 --version || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - bigdata
    volumes:
      - share_data:/partage
  
  mysql:
    image: mysql:8.0
    container_name: mysql
    hostname: mysql
    # mysql -u root -p'root_password' -e "GRANT ALL PRIVILEGES ON *.* TO 'nanp'@'%'; FLUSH PRIVILEGES;"
    environment:
      - MYSQL_ROOT_PASSWORD=mysql
      - MYSQL_USER=nanp
      - MYSQL_PASSWORD=nanp
      - MYSQL_DATABASE=nanp_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql
      - ./my-custom.cnf:/etc/mysql/conf.d/my-custom.cnf
      - share_data:/partage
    networks:
      - bigdata
    ports:
      - "8889:3306"

  schema-registry:
    # size: 1.474GB
    image: confluentinc/cp-schema-registry:7.5.0
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy # Attend que le healthcheck de 'kafka' passe
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka:9092'
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: 'http://0.0.0.0:8081'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - bigdata
    volumes:
      - share_data:/partage
    ports:
      - "8091:8081"

  #kafka-connect:
  #  image: confluentinc/cp-kafka-connect:7.5.0
  #  hostname: kafka-connect
  #  container_name: kafka-connect
  #  depends_on:
  #    kafka:
  #      condition: service_healthy # Attend que le healthcheck de 'kafka' passe
  #    schema-registry:
  #      condition: service_healthy # Attend que le healthcheck de 'schema-registry' passe
  #  environment:
  #    CONNECT_BOOTSTRAP_SERVERS: 'kafka:9092'
  #    CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
  #    CONNECT_GROUP_ID: 'kafka-connect-group'
  #    CONNECT_CONFIG_STORAGE_TOPIC: 'kafka-connect-configs'
  #    CONNECT_OFFSET_STORAGE_TOPIC: 'kafka-connect-offsets'
  #    CONNECT_STATUS_STORAGE_TOPIC: 'kafka-connect-status'
  #    CONNECT_KEY_CONVERTER: 'org.apache.kafka.connect.json.JsonConverter'
  #    CONNECT_VALUE_CONVERTER: 'org.apache.kafka.connect.json.JsonConverter'
  #    CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: 'false'
  #    CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: 'false'
  #    CONNECT_PLUGIN_PATH: '/usr/share/java,/usr/share/confluent-hub-components'
  #  healthcheck:
  #    test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
  #    interval: 30s
  #    timeout: 10s
  #    retries: 5
  #    start_period: 30s
  #  networks:
  #    - bigdata
  #  volumes:
  #    - share_data:/partage
  #  ports:
  #    - "8093:8083"

  connect:
    image: confluentinc/cp-kafka-connect-base:7.7.7
    #size: 1.3GB
    hostname: connect
    container_name: connect
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8093:8083"
    networks:
      - bigdata
    volumes:
      - share_data:/partage
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka:9092"
      CONNECT_REST_ADVERTISED_HOST_NAME: "connect"
      CONNECT_GROUP_ID: "connect-cluster"
      CONNECT_CONFIG_STORAGE_TOPIC: "connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "connect-status"
      #CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      #CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      # Key Converter (vaak String of Avro)
      CONNECT_KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      # Needed for Parquet/Avro
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
      CONNECT_REPLICATION_FACTOR: 1
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - /bin/bash
      - -c
      - |
        # Installation des connecteurs Source (Mysql) et Sink (Minio)
        until confluent-hub install --no-prompt debezium/debezium-connector-mysql:latest; do sleep 5; done
        until confluent-hub install --no-prompt confluentinc/kafka-connect-s3:latest; do sleep 5; done
        /etc/confluent/docker/run

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    hostname: minio
    ports:
      - "9030:9000" # API S3
      - "9031:9001" # Console Web (UI)
    environment:
      # Access Key (Username) et de Secret Key (Password)
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
      - share_data:/partage
    command: server /data --console-address ":9001"
    restart: always
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - bigdata

volumes:
  mysql_data:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/mysql
      o: bind
  minio_data:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/minio
      o: bind
  share_data:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/share_folder
      o: bind

networks:
  bigdata:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: bigdata_bridge